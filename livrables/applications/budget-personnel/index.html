<!doctype html>
<html lang="fr">

<title>Budget &amp; 50/30/20 — D·Jarvis</title>
<style>

  a{color:var(--navy)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 60px}

  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff}
  select,input,textarea,button{font-family:inherit;font-size:14px}
  .field{display:flex;flex-direction:column;gap:4px}

  input[type=text],input[type=number],input[type=date],select,textarea{border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink)}
  textarea{resize:vertical;min-height:90px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px}
  .btn{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--navy2)}
  .btn.alt{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.alt:hover{background:#f0f3f7}
  .btn.orange{background:var(--gold);color:#1a1206} .btn.orange:hover{background:var(--gold-dk);color:#fff}
  .btn.danger{background:#fff;color:var(--bad);border:1px solid #f1c9c9}
  .btn.sm{padding:6px 10px;font-size:13px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .bar-track{background:#eef1f5;border-radius:999px;height:14px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px}
  .target-mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:#1c2530}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .advice{border-left:4px solid var(--line);padding:10px 14px;margin:10px 0;background:#fbfcfd;border-radius:0 10px 10px 0}
  .advice.bad{border-color:var(--bad);background:#fdf5f5}
  .advice.warn{border-color:var(--warn);background:#fdf9f1}
  .advice.ok{border-color:var(--ok);background:#f3faf6}
  .advice.info{border-color:var(--navy)}
  .advice h4{margin:0 0 4px;font-size:15px}
  .advice p{margin:0;font-size:14px;color:#46505d}
  .banner{background:#fff7ec;border:1px solid #f3d8a8;color:#7a5a1e;padding:12px 16px;border-radius:12px;margin-bottom:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}

  .sectiontitle{font-size:16px;font-weight:800;margin:6px 0 12px}
  .chart-svg{width:100%;height:auto;display:block}

<script>
"use strict";

/* ============================ RÉFÉRENTIEL ============================ */
// univers dépenses : perso | pro | edrington | avance | patrimoine
// bucket (perso uniquement) : besoin | envie | epargne
// univers revenus : reel | remboursement
const DEFAULT_CATEGORIES = [

  {slug:"sante",        label:"Santé",                       kind:"depense", univers:"perso", bucket:"besoin", color:"#dc2626", fixe:false},

  {slug:"restaurants",  label:"Restaurants & sorties",       kind:"depense", univers:"perso", bucket:"envie",  color:"#ea580c", fixe:false},
  {slug:"shopping",     label:"Shopping & plaisir",          kind:"depense", univers:"perso", bucket:"envie",  color:"#db2777", fixe:false},
  {slug:"loisirs",      label:"Voyages, loisirs & cadeaux",  kind:"depense", univers:"perso", bucket:"envie",  color:"#7c3aed", fixe:false},
  {slug:"dons",         label:"Dons & solidarité",           kind:"depense", univers:"perso", bucket:"envie",  color:"#9d174d", fixe:false},
  // --- DÉPENSES PERSO : ÉPARGNE (20%) ---
  {slug:"epargne",      label:"Épargne",                     kind:"depense", univers:"perso", bucket:"epargne",color:"#0d9488", fixe:false},
  // --- HORS 50/30/20 (neutre) ---
  {slug:"avance",       label:"Avance pour un proche",       kind:"depense", univers:"avance",    bucket:null, color:"#a16207", fixe:false},
  {slug:"edrington",    label:"Frais Edrington (remboursés)",kind:"depense", univers:"edrington", bucket:null, color:"#9f1239", fixe:false},
  {slug:"pro",          label:"Pro micro-entreprise",        kind:"depense", univers:"pro",       bucket:null, color:"#4f46e5", fixe:false},
  // --- INVESTISSEMENT / PATRIMOINE (hors 50/30/20) ---
  {slug:"patrimoine",   label:"Immobilier / parking",        kind:"depense", univers:"patrimoine",bucket:null, color:"#78350f", fixe:false},
  {slug:"bourse",       label:"Bourse & actions",            kind:"depense", univers:"patrimoine",bucket:null, color:"#b45309", fixe:false},
  // --- REVENUS ---
  {slug:"salaire",      label:"Salaire Edrington",           kind:"revenu", univers:"reel",          bucket:null, color:"#1e3a8a", fixe:false},
  {slug:"missions",     label:"Missions ponctuelles (Accor)",kind:"revenu", univers:"reel",          bucket:null, color:"#0891b2", fixe:false},
  {slug:"micro",        label:"Revenus micro-entreprise",    kind:"revenu", univers:"reel",          bucket:null, color:"#16a34a", fixe:false},
  {slug:"aides",        label:"Aides (CAF, familial)",       kind:"revenu", univers:"reel",          bucket:null, color:"#64748b", fixe:false},
  {slug:"remb_proche",  label:"Remboursement avance proche", kind:"revenu", univers:"remboursement", bucket:null, color:"#a16207", fixe:false},
  {slug:"remb_divers",  label:"Remboursement / retour divers",kind:"revenu", univers:"remboursement", bucket:null, color:"#0e7490", fixe:false},
  {slug:"remb_edrington",label:"Remboursement frais Edrington",kind:"revenu",univers:"remboursement", bucket:null, color:"#9f1239", fixe:false},
];

// Règles d'auto-catégorisation (mots-clés -> slug). Ordre = priorité.
const DEFAULT_RULES = [
  {kw:"loyer", cat:"logement"},
  {kw:"assurance vie", cat:"epargne"},
  {kw:"tontin", cat:"epargne"},
  {kw:"sureavenir", cat:"epargne"},
  {kw:"livret", cat:"epargne"},
  {kw:"notaire", cat:"patrimoine"},
  {kw:"immobilier", cat:"patrimoine"},
  {kw:"villeneuve le roi", cat:"patrimoine"},
  {kw:"trade republic", cat:"bourse"},
  {kw:"degiro", cat:"bourse"},
  {kw:"etf", cat:"bourse"},
  {kw:"pea", cat:"bourse"},
  {kw:"bourse", cat:"bourse"},
  {kw:"pret etudiant", cat:"factures"},
  {kw:"assurance", cat:"factures"},
  {kw:"bpce", cat:"factures"},
  {kw:"cotisation", cat:"factures"},
  {kw:"spotify", cat:"factures"},
  {kw:"netflix", cat:"factures"},
  {kw:"basic fit", cat:"factures"},
  {kw:"amazon prime", cat:"factures"},
  {kw:"uber one", cat:"factures"},
  {kw:"revolut", cat:"factures"},
  {kw:"suno", cat:"factures"},
  {kw:"disney", cat:"factures"},
  {kw:"sosh", cat:"factures"},
  {kw:"orange", cat:"factures"},
  {kw:"squarespace", cat:"pro"},
  {kw:"anthropic", cat:"pro"},
  {kw:"claude", cat:"pro"},
  {kw:"vercel", cat:"pro"},
  {kw:"openai", cat:"pro"},
  {kw:"d-vtc", cat:"pro"},
  {kw:"navigo", cat:"edrington"},
  {kw:"uber eats", cat:"edrington"},
  {kw:"uber eat", cat:"edrington"},
  {kw:"bolt", cat:"transport"},
  {kw:"indigo", cat:"transport"},
  {kw:"sanef", cat:"transport"},
  {kw:"ratp", cat:"transport"},
  {kw:"carrefour", cat:"alimentation"},
  {kw:"intermarche", cat:"alimentation"},
  {kw:"franprix", cat:"alimentation"},
  {kw:"coccinelle", cat:"alimentation"},
  {kw:"bouch samiry", cat:"alimentation"},
  {kw:"boucherie", cat:"alimentation"},
  {kw:"smile food", cat:"alimentation"},
  {kw:"delhaize", cat:"alimentation"},
  {kw:"mercadona", cat:"alimentation"},
  {kw:"grocery", cat:"alimentation"},
  {kw:"consum", cat:"alimentation"},
  {kw:"mucoviscidose", cat:"dons"},
  {kw:"fnac", cat:"shopping"},
  {kw:"amazon", cat:"shopping"},
  {kw:"zara", cat:"shopping"},
  {kw:"leboncoin", cat:"shopping"},
  {kw:"booking", cat:"loisirs"},
  {kw:"farmacia", cat:"sante"},
  {kw:"pharmacie", cat:"sante"},
  {kw:"doctolib", cat:"sante"},
  {kw:"caf", cat:"aides"},
  {kw:"levy", cat:"missions"},
  {kw:"edrington", cat:"salaire"},
  {kw:"penard", cat:"salaire"},
];

// préfixes "Prénom -" considérés comme avances pour un proche
const AVANCE_NAMES = ["souki","soukayna","soukaina","papa","maman","nicolas","frederick","federick","mariana","daniel","vicky","lucie","freddy","miguel","jonathan","kadir","julien","clement","mikael","thibault","david","salome","samuel","laura","erwan","alexandre","yao","kowsik","lea","medjy","brian","thibaut","samuel"];

const NET_PAR_CHAUFFEUR = 55.06; // € net/mois par chauffeur D-VTC (réf. CONTEXT)
const STORE_KEY = "djarvis-budget-v3";

/* ============================ ÉTAT ============================ */
let state = null;

function defaultState(){
  return {
    version:2,
    soldeInitial:1322.51,
    targets:{besoins:50, envies:30, epargne:20},
    categories:JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
    rules:JSON.parse(JSON.stringify(DEFAULT_RULES)),
    transactions:[]
  };
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ state = JSON.parse(raw); migrate(); }
    else state = defaultState();
  }catch(e){ state = defaultState(); }
}
function migrate(){
  const d = defaultState();
  if(!state.targets) state.targets = d.targets;
  if(!state.categories || !state.categories.length) state.categories = d.categories;
  if(!state.rules) state.rules = d.rules;
  if(typeof state.soldeInitial!=="number") state.soldeInitial = d.soldeInitial;
  if(!Array.isArray(state.transactions)) state.transactions = [];
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* ============================ UTILITAIRES ============================ */
const MONTHS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const eur = n => (Number(n)||0).toLocaleString("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2});
const eur0 = n => (Number(n)||0).toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
const pct = n => (Number(n)||0).toLocaleString("fr-FR",{maximumFractionDigits:1})+" %";
const uid = () => Math.random().toString(36).slice(2,10);
const ym = d => (d||"").slice(0,7);
const monthLabel = y => { if(!y) return ""; const [yy,mm]=y.split("-"); return MONTHS_FR[(+mm)-1]+" "+yy; };
const MONTHS_ABBR = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const monthAbbr = y => { if(!y) return ""; const [yy,mm]=y.split("-"); const a=MONTHS_ABBR[(+mm)-1]; return (+mm)===1 ? a+" "+yy.slice(2) : a; };
function catBySlug(slug){ return state.categories.find(c=>c.slug===slug) || {slug:slug,label:slug||"Divers",kind:"depense",univers:"perso",bucket:"envie",color:"#9aa4b1",fixe:false}; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

function availableMonths(){
  const set = new Set(state.transactions.map(t=>ym(t.date)).filter(Boolean));
  return [...set].sort();
}

/* ===================== CALCULS D'UN MOIS ===================== */
function computeMonth(month){
  const txs = state.transactions.filter(t=>ym(t.date)===month);
  const r = {
    month, txs,
    revReel:0, revRemb:0, rembProche:0, rembEdr:0, micro:0,
    besoins:0, envies:0, eparg:0, depPro:0, depEdr:0, avances:0, patrimoine:0,
    byCat:{}, // slug -> montant (dépenses perso)
  };
  for(const t of txs){
    const c = catBySlug(t.cat); const a = Number(t.amount)||0;
    if(t.kind==="revenu"){
      if(c.univers==="reel"){ r.revReel+=a; if(c.slug==="micro") r.micro+=a; }
      else if(c.univers==="remboursement"){ r.revRemb+=a; if(c.slug==="remb_proche") r.rembProche+=a; if(c.slug==="remb_edrington") r.rembEdr+=a; }
    } else {
      if(c.univers==="perso"){
        if(c.bucket==="besoin") r.besoins+=a;
        else if(c.bucket==="envie") r.envies+=a;
        else if(c.bucket==="epargne") r.eparg+=a;
        r.byCat[c.slug]=(r.byCat[c.slug]||0)+a;
      }
      else if(c.univers==="pro") r.depPro+=a;
      else if(c.univers==="edrington") r.depEdr+=a;
      else if(c.univers==="avance") r.avances+=a;
      else if(c.univers==="patrimoine") r.patrimoine+=a;
    }
  }
  r.coutVie = r.besoins + r.envies;                 // dépenses perso hors épargne
  r.depPerso = r.coutVie + r.eparg;
  r.reste = r.revReel - r.coutVie;                  // reste / capacité d'épargne (ce qui reste après besoins+envies)
  r.capacite = r.reste;
  r.tauxEpargne = r.revReel>0 ? (r.reste/r.revReel*100) : 0;
  // base 50/30/20 = revenu réel ; les 3 tranches somment à 100 %
  r.pBesoins = r.revReel>0 ? r.besoins/r.revReel*100 : 0;
  r.pEnvies  = r.revReel>0 ? r.envies/r.revReel*100 : 0;
  r.pReste   = r.revReel>0 ? r.reste/r.revReel*100 : 0;
  r.pEparg   = r.pReste;
  // flux trésorerie (épargne comptée comme engagée)
  r.flux = (r.revReel + r.revRemb) - (r.depPerso + r.depPro + r.depEdr + r.avances);
  // charges fixes du mois
  r.fixe = 0;
  for(const t of txs){ const c=catBySlug(t.cat); if(t.kind==="depense" && c.univers==="perso" && c.fixe) r.fixe += Number(t.amount)||0; }
  return r;
}
function soldeAt(month){
  let s = state.soldeInitial;
  for(const m of availableMonths()){ if(m>month) break; s += computeMonth(m).flux; }
  return s;
}
// solde au début du mois = solde de fin du mois précédent (ou solde initial pour le 1er mois)
function soldeStart(month){
  let s = state.soldeInitial;
  for(const m of availableMonths()){ if(m>=month) break; s += computeMonth(m).flux; }
  return s;
}
// cumul des avances vs remboursements (toutes périodes) = ce qu'on te doit
function cumulNeutre(){
  let av=0, rp=0, edr=0, redr=0;
  for(const t of state.transactions){
    const c=catBySlug(t.cat), a=Number(t.amount)||0;
    if(t.kind==="depense" && c.univers==="avance") av+=a;
    if(t.kind==="depense" && c.univers==="edrington") edr+=a;
    if(t.kind==="revenu" && c.slug==="remb_proche") rp+=a;
    if(t.kind==="revenu" && c.slug==="remb_edrington") redr+=a;
  }
  return {avances:av, rembProche:rp, dueProche:av-rp, edr:edr, rembEdr:redr, dueEdr:edr-redr};
}

/* ============================ SVG CHARTS ============================ */
function donut(segments, size=170, thick=26){
  const total = segments.reduce((s,x)=>s+x.value,0);
  const r=(size-thick)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  let off=0, arcs="";
  if(total>0){
    for(const s of segments){
      if(s.value<=0) continue;
      const len=s.value/total*circ;
      arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thick}" stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
      off+=len;
    }
  } else {
    arcs=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef1f5" stroke-width="${thick}"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" class="chart-svg" style="max-width:${size}px;margin:auto">${arcs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="#6b7787">Total</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="15" font-weight="800" fill="#1c2530">${eur0(total)}</text></svg>`;
}

function lineChart(series, xlabels, opts={}){
  const W=opts.w||620, H=opts.h||240, pl=46, pr=14, pt=16, pb=34;
  const iw=W-pl-pr, ih=H-pt-pb;
  let maxY=0; series.forEach(s=>s.points.forEach(p=>{maxY=Math.max(maxY,p)}));
  maxY = maxY<=0?100:maxY*1.12;
  const n=xlabels.length;
  const xat=i=> n<=1? pl+iw/2 : pl + iw*i/(n-1);
  const yat=v=> pt + ih*(1-v/maxY);
  let g="";
  // grille horizontale
  for(let k=0;k<=4;k++){ const v=maxY*k/4, y=yat(v); g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#eef1f5"/><text x="${pl-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#9aa4b1">${eur0(v)}</text>`; }
  xlabels.forEach((lb,i)=>{ g+=`<text x="${xat(i)}" y="${H-12}" text-anchor="middle" font-size="11" fill="#6b7787">${esc(lb)}</text>`; });
  for(const s of series){
    let d="";
    s.points.forEach((p,i)=>{ d+=(i?"L":"M")+xat(i).toFixed(1)+" "+yat(p).toFixed(1)+" "; });
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round"/>`;
    s.points.forEach((p,i)=>{ g+=`<circle cx="${xat(i).toFixed(1)}" cy="${yat(p).toFixed(1)}" r="3.5" fill="#fff" stroke="${s.color}" stroke-width="2"/>`; });
  }
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg">${g}</svg>`;
}

function stackedBars(months, opts={}){
  // months: [{label, besoins, envies, eparg}]
  const W=opts.w||620, H=opts.h||240, pl=46, pr=14, pt=16, pb=34;
  const iw=W-pl-pr, ih=H-pt-pb;
  let maxY=0; months.forEach(m=>maxY=Math.max(maxY,m.besoins+m.envies+m.eparg));
  maxY=maxY<=0?100:maxY*1.12;
  const n=months.length, bw=Math.min(60, iw/n*0.55);
  const yat=v=> pt+ih*(1-v/maxY);
  const xc=i=> pl + iw*(i+0.5)/n;
  let g="";
  for(let k=0;k<=4;k++){ const v=maxY*k/4,y=yat(v); g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#eef1f5"/><text x="${pl-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#9aa4b1">${eur0(v)}</text>`; }
  months.forEach((m,i)=>{
    const x=xc(i)-bw/2; let yb=yat(0);
    const segs=[["besoins",m.besoins,"#2563eb"],["envies",m.envies,"#ea580c"],["eparg",m.eparg,"#0d9488"]];
    for(const [,val,col] of segs){ const h=ih*val/maxY; yb-=h; g+=`<rect x="${x}" y="${yb.toFixed(1)}" width="${bw}" height="${Math.max(0,h).toFixed(1)}" fill="${col}"/>`; }
    g+=`<text x="${xc(i)}" y="${H-12}" text-anchor="middle" font-size="11" fill="#6b7787">${esc(m.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg">${g}</svg>`;
}

function addTxFromForm(){
  const date=document.getElementById("f_date").value;
  const amount=parseFloat(String(document.getElementById("f_amount").value).replace(",","."));
  const desc=document.getElementById("f_desc").value.trim();
  const cat=document.getElementById("f_cat").value;
  if(!date || !(amount>0) || !desc){ alert("Renseigne une date, un montant positif et une description."); return; }
  const c=catBySlug(cat);
  state.transactions.push({id:uid(),date,amount,kind:c.kind,cat,desc});
  save();
  document.getElementById("f_amount").value=""; document.getElementById("f_desc").value="";
  renderTransactions();
}

/* auto-catégorisation d'une description */
function autoCat(desc, kind){
  const d=(desc||"").toLowerCase().trim();
  // 0) exceptions prioritaires
  if(d.includes("tontin")) return kind==="revenu"?"remb_divers":"epargne";
  if(kind==="revenu"){
    if(d.includes("aide remboursement")) return "aides";
    if(/amazon|deporvillage|getaround|cpam|april|d-vtc|pret|investissement|villeneuve|paiement parking/.test(d)) return "remb_divers";
  }
  // 1) avance : "Prénom - ..."
  for(const n of AVANCE_NAMES){ if(new RegExp("^"+n+"\\s*-").test(d)) return kind==="revenu"?"remb_proche":"avance"; }
  // 2) règles mots-clés
  for(const r of state.rules){ if(d.includes(r.kw)){ const c=catBySlug(r.cat); if(c.kind===kind) return r.cat; } }
  // 3) fallback (à corriger à la main avant validation)
  return kind==="revenu"?"aides":"shopping";
}

let pasteRows=[];
function parsePaste(){
  const kind=document.getElementById("pasteKind").value;
  const raw=document.getElementById("pasteArea").value;
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  pasteRows=[];
  for(const line of lines){
    // séparateurs : tab, ; , ou 2+ espaces
    let parts=line.split(/\t|;|\s{2,}/).map(s=>s.trim()).filter(Boolean);
    if(parts.length<2) parts=line.split(/\s+/);
    let date="", amount=null, descParts=[];
    for(const p of parts){
      if(!date){ const dm=p.match(/^(\d{4})-(\d{2})-(\d{2})$/); const dm2=p.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if(dm){ date=p; continue; } if(dm2){ date=dm2[3]+"-"+dm2[2]+"-"+dm2[1]; continue; } }
      if(amount===null){ const num=p.replace(/[€\s]/g,"").replace(/\.(?=\d{3}\b)/g,"").replace(",","."); if(/^-?\d+(\.\d+)?$/.test(num)){ amount=Math.abs(parseFloat(num)); continue; } }
      descParts.push(p);
    }
    const desc=descParts.join(" ").trim();
    if(amount===null || !desc) continue;
    if(!date) date=(months().slice(-1)[0]||"2026-06")+"-15";
    pasteRows.push({date, amount, desc, kind, cat:autoCat(desc,kind), include:true});
  }
  renderPastePreview();
}
function renderPastePreview(){
  const host=document.getElementById("pastePreview");
  if(!pasteRows.length){ host.innerHTML=`<div class="muted small">Rien à importer (vérifie le format).</div>`; return; }
  const cats=state.categories.filter(c=>c.kind===pasteRows[0].kind);
  const rows=pasteRows.map((r,i)=>{
    const opts=cats.map(c=>`<option value="${c.slug}" ${c.slug===r.cat?"selected":""}>${esc(c.label)}</option>`).join("");
    return `<tr>
      <td><input type="checkbox" data-inc="${i}" ${r.include?"checked":""}></td>
      <td class="muted small">${esc(r.date)}</td>
      <td class="small">${esc(r.desc)}</td>
      <td class="num small">${eur(r.amount)}</td>
      <td><select data-pcat="${i}" style="padding:4px 6px;font-size:12px">${opts}</select></td>
    </tr>`;
  }).join("");
  host.innerHTML=`<div class="scroll" style="max-height:240px"><table><thead><tr><th></th><th>Date</th><th>Description</th><th class="num">Montant</th><th>Catégorie</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="flex" style="margin-top:10px"><button class="btn orange" id="confirmPaste">Importer ${pasteRows.length} ligne(s)</button><span class="muted small">Décoche celles à ignorer.</span></div>`;
  host.querySelectorAll("[data-inc]").forEach(c=>c.addEventListener("change",()=>{pasteRows[+c.dataset.inc].include=c.checked;}));
  host.querySelectorAll("[data-pcat]").forEach(s=>s.addEventListener("change",()=>{pasteRows[+s.dataset.pcat].cat=s.value;}));
  document.getElementById("confirmPaste").addEventListener("click",()=>{
    let n=0;
    for(const r of pasteRows){ if(!r.include) continue; const c=catBySlug(r.cat); state.transactions.push({id:uid(),date:r.date,amount:r.amount,kind:c.kind,cat:r.cat,desc:r.desc}); n++; }
    pasteRows=[]; save(); document.getElementById("pasteArea").value=""; renderTransactions();
    alert(n+" transaction(s) importée(s).");
  });
}

/* ============================ CONSEILS ============================ */
function renderConseils(){
  const host=document.getElementById("conseils");
  const ms=months();
  if(ms.length===0){ host.innerHTML=`<div class="card">Pas encore de données à analyser.</div>`; return; }
  const data=ms.map(computeMonth);
  const cur=data[data.length-1];
  const prev=data.length>1?data[data.length-2]:null;
  const adv=[];

  // 1) 50/30/20
  if(cur.revReel>0){
    if(cur.pBesoins>state.targets.besoins){
      const over=cur.besoins - cur.revReel*state.targets.besoins/100;
      adv.push(["bad","Tes besoins dépassent 50 % de ton revenu réel",
        `En ${monthLabel(cur.month)}, tes besoins pèsent <b>${pct(cur.pBesoins)}</b> de ton revenu réel (cible 50 %), soit <b>${eur(over)}</b> de trop. Principal poids : le loyer (${eur(getCatMonth(cur.month,'logement'))}). Tant que ton revenu réel reste bas, ce ratio restera tendu : la vraie solution est d'augmenter le revenu (micro-entreprise), pas seulement de couper.`]);
    } else {
      adv.push(["ok","Tes besoins sont sous contrôle", `Tes besoins représentent ${pct(cur.pBesoins)} de ton revenu réel, sous la cible de 50 %.`]);
    }
    if(cur.pReste < state.targets.epargne){
      const manque = cur.revReel*state.targets.epargne/100 - cur.reste;
      adv.push(["warn","Ton reste à épargner est sous la cible de 20 %",
        `Après tes besoins et tes envies, il te reste <b>${eur(cur.reste)}</b> (${pct(cur.pReste)} de tes revenus), dont <b>${eur(cur.eparg)}</b> réellement placés. Pour viser 20 %, il faudrait <b>${eur(manque)}</b> de plus. Astuce : automatise un virement vers ton Livret le jour de la paie (paie-toi en premier).`]);
    } else {
      adv.push(["ok","Objectif épargne atteint", `Il te reste ${pct(cur.pReste)} de tes revenus après besoins et envies, au-dessus de la cible de 20 %. Continue.`]);
    }
    if(cur.pEnvies>state.targets.envies){
      adv.push(["warn","Tes envies dépassent 30 %", `Tes envies pèsent ${pct(cur.pEnvies)} ce mois-ci (cible 30 %). Regarde en priorité : restaurants/sorties et voyages.`]);
    }
  }

  // 2) revenu anormalement bas
  if(prev && cur.revReel < prev.revReel*0.8){
    adv.push(["bad","Chute de ton revenu réel ce mois-ci",
      `Ton revenu réel passe de <b>${eur(prev.revReel)}</b> à <b>${eur(cur.revReel)}</b> (${pct((cur.revReel/prev.revReel-1)*100)}). À vérifier : décalage de paie, mois sans mission, ou vraie baisse ? Ce mois-là, tes besoins seuls (${eur(cur.besoins)}) ${cur.besoins>cur.revReel?"<b>dépassent</b>":"approchent"} ton revenu réel.`]);
  }

  // 3) postes en forte hausse
  if(prev){
    const slugs=new Set([...Object.keys(cur.byCat),...Object.keys(prev.byCat)]);
    const hausses=[];
    for(const s of slugs){ const a=cur.byCat[s]||0, b=prev.byCat[s]||0; if(a-b>40 && a>b*1.3){ hausses.push([s,a-b,b,a]); } }
    hausses.sort((x,y)=>y[1]-x[1]);
    for(const h of hausses.slice(0,3)){
      adv.push(["info",`Hausse : ${catBySlug(h[0]).label}`, `Ce poste passe de ${eur(h[2])} à <b>${eur(h[3])}</b> (+${eur(h[1])}) vs ${monthLabel(prev.month)}. Volontaire ou à surveiller ?`]);
    }
  }

  // 4) avances à récupérer
  const n=cumulNeutre();
  if(n.dueProche>30) adv.push(["info","De l'argent à te faire rembourser",
    `Tes proches te doivent encore <b>${eur(n.dueProche)}</b> (avances non remboursées). Relance-les : c'est de la trésorerie qui dort.`]);

  // 5) objectif micro / charges fixes
  const gap=Math.max(0,cur.fixe-cur.micro); const chf=Math.ceil(gap/NET_PAR_CHAUFFEUR);
  adv.push(["info","Cap sur l'autonomie de tes charges fixes",
    `Tes charges fixes du mois sont de <b>${eur(cur.fixe)}</b>, couvertes à hauteur de <b>${eur(cur.micro)}</b> par ta micro-entreprise. Pour les rendre autonomes du salariat, vise l'équivalent de <b>~${chf} chauffeurs D-VTC</b> en revenus récurrents (D-VTC, coaching, conseil ou sites). Chaque revenu récurrent fait baisser ta dépendance aux missions énergivores (Accor).`]);

  // 6) prêt étudiant (détection de la hausse)
  let pretMin=Infinity, pretMax=0;
  for(const t of state.transactions){ if(t.kind==="depense" && (t.desc||"").toLowerCase().includes("pret etudiant")){ const a=Number(t.amount)||0; pretMin=Math.min(pretMin,a); pretMax=Math.max(pretMax,a); } }
  if(pretMax>pretMin*3 && pretMin<Infinity) adv.push(["warn","Ton prêt étudiant a fortement augmenté",
    `Sa mensualité est passée d'environ <b>${eur(pretMin)}</b> à <b>${eur(pretMax)}</b> (fin du différé). C'est ~${eur((pretMax-pretMin)*12)} de charges fixes en plus sur un an : à intégrer dans ton objectif de revenus récurrents.`]);

  // 7) mois exceptionnel (patrimoine)
  const patMonth=data.find(d=>d.patrimoine>1000);
  if(patMonth) adv.push(["info","Un mois exceptionnel d'investissement",
    `En <b>${monthLabel(patMonth.month)}</b>, tu as engagé <b>${eur(patMonth.patrimoine)}</b> en patrimoine (achat du parking), financé par ton épargne. C'est isolé du 50/30/20 pour ne pas fausser ta lecture : ce n'est pas une dépense de train de vie mais un actif.`]);

  // 8) factures fixes
  const abo=getCatMonth(cur.month,"factures");
  if(abo>0) adv.push(["info","Passe en revue tes factures fixes",
    `Tu paies <b>${eur(abo)}</b> de factures fixes ce mois-ci (téléphone, banque, assurances, crédits, abonnements). C'est récurrent toute l'année : ${eur(abo*12)} sur 12 mois. Traque les abonnements que tu n'utilises plus.`]);

  // synthèse chiffrée
  const synth=`<div class="card" style="margin-bottom:16px">
    <h3>Synthèse — ${monthLabel(cur.month)}</h3>
    <div class="grid3">
      ${kpi("Revenu réel",eur(cur.revReel),"",cur.revReel>=2000?"pos":"warnc")}
      ${kpi("Reste / épargne",eur(cur.reste),pct(cur.pReste)+" de tes revenus",cur.reste>=0?"pos":"neg")}
      ${kpi("dont réellement placé",eur(cur.eparg),"Livret, Assurance Vie, tontine",cur.eparg>0?"pos":"")}
    </div>
    <div class="muted small" style="margin-top:10px">Analyse générée localement à partir de tes données. Ce ne sont pas des conseils financiers réglementés, mais une lecture d'analyste de ton budget.</div>
  </div>`;

  host.innerHTML=synth+adv.map(a=>`<div class="advice ${a[0]}"><h4>${a[1]}</h4><p>${a[2]}</p></div>`).join("");
}
function getCatMonth(month,slug){ return computeMonth(month).byCat[slug]||0; }

/* ============================ RÉGLAGES ============================ */
function renderReglages(){
  const host=document.getElementById("reglages");
  const catRows=state.categories.map((c,i)=>{
    const isDep=c.kind==="depense";
    const univOpts=["perso","pro","edrington","avance","patrimoine"].map(u=>`<option value="${u}" ${c.univers===u?"selected":""}>${univLabel(u)}</option>`).join("");
    const univOptsRev=["reel","remboursement"].map(u=>`<option value="${u}" ${c.univers===u?"selected":""}>${univLabel(u)}</option>`).join("");
    const buckOpts=["besoin","envie","epargne"].map(b=>`<option value="${b}" ${c.bucket===b?"selected":""}>${b}</option>`).join("");
    return `<tr>
      <td><span class="dot" style="background:${c.color}"></span> ${esc(c.label)} <span class="tag2">${c.kind}</span></td>
      <td><select data-cu="${i}" style="padding:4px">${isDep?univOpts:univOptsRev}</select></td>
      <td>${isDep&&c.univers==="perso"?`<select data-cb="${i}" style="padding:4px">${buckOpts}</select>`:`<span class="muted small">—</span>`}</td>
      <td style="text-align:center">${isDep&&c.univers==="perso"?`<input type="checkbox" data-cf="${i}" ${c.fixe?"checked":""}>`:""}</td>
    </tr>`;
  }).join("");

  host.innerHTML=`
  <div class="grid2">
    <div class="card">
      <h3>Sauvegarde &amp; données</h3>
      <p class="muted small">Tes données sont enregistrées <b>uniquement dans ce navigateur</b>. Exporte régulièrement une sauvegarde (et garde-la en lieu sûr). Pour transférer sur un autre appareil, exporte ici puis importe là-bas.</p>
      <div class="flex" style="margin-top:10px">
        <button class="btn" id="btnExport">Exporter une sauvegarde (.json)</button>
        <button class="btn alt" id="btnImport">Importer une sauvegarde</button>
      </div>
      <div class="flex" style="margin-top:10px">
        <button class="btn danger" id="btnReset">Tout effacer</button>
        <span class="muted small">${state.transactions.length} transaction(s) · ${months().length} mois</span>
      </div>
    </div>
    <div class="card">
      <h3>Paramètres</h3>
      <div class="row">
        <div class="field" style="flex:1"><label>Solde de départ du tout premier mois suivi (€)</label><input type="number" step="0.01" id="set_solde" value="${state.soldeInitial}"></div>
      </div>
      <p class="muted small" style="margin:6px 0 0">À renseigner une seule fois : c'est l'argent dont tu disposais au début du premier mois (sept. 2025). Ensuite, chaque mois démarre automatiquement avec le solde de fin du mois précédent.</p>
      <div class="sectiontitle" style="margin-top:14px">Cibles 50 / 30 / 20</div>
      <div class="row">
        <div class="field"><label>Besoins %</label><input type="number" id="t_b" value="${state.targets.besoins}" style="width:90px"></div>
        <div class="field"><label>Envies %</label><input type="number" id="t_e" value="${state.targets.envies}" style="width:90px"></div>
        <div class="field"><label>Épargne %</label><input type="number" id="t_s" value="${state.targets.epargne}" style="width:90px"></div>
      </div>
      <div class="flex" style="margin-top:12px"><button class="btn" id="saveParams">Enregistrer les paramètres</button></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3>Catégories &amp; charges fixes</h3>
    <p class="muted small">Pour chaque catégorie : sa <b>nature</b> (perso, pro, argent qui passe…), sa <b>part 50/30/20</b> (besoin / envie / épargne) et si c'est une <b>charge fixe</b> (dépense qui revient chaque mois, comme le loyer). Les charges fixes servent à calculer combien il te manque de revenus récurrents.</p>
    <div class="scroll" style="max-height:420px"><table><thead><tr><th>Catégorie</th><th>Nature</th><th>Part 50/30/20</th><th>Charge fixe ?</th></tr></thead><tbody>${catRows}</tbody></table></div>
    <div class="flex" style="margin-top:10px"><button class="btn" id="saveCats">Enregistrer les catégories</button></div>
  </div>`;

  document.getElementById("btnExport").addEventListener("click", exportBackup);
  document.getElementById("btnImport").addEventListener("click", ()=>document.getElementById("fileInput").click());
  document.getElementById("btnReset").addEventListener("click", ()=>{ if(confirm("Effacer TOUTES les données de cet outil ? (pense à exporter d'abord)")){ state=defaultState(); save(); currentMonth=null; render(); } });
  document.getElementById("saveParams").addEventListener("click", ()=>{
    state.soldeInitial=parseFloat(String(document.getElementById("set_solde").value).replace(",","."))||0;
    state.targets.besoins=parseFloat(document.getElementById("t_b").value)||50;
    state.targets.envies=parseFloat(document.getElementById("t_e").value)||30;
    state.targets.epargne=parseFloat(document.getElementById("t_s").value)||20;
    save(); alert("Paramètres enregistrés."); render();
  });
  document.getElementById("saveCats").addEventListener("click", ()=>{
    host.querySelectorAll("[data-cu]").forEach(s=>{ state.categories[+s.dataset.cu].univers=s.value; });
    host.querySelectorAll("[data-cb]").forEach(s=>{ state.categories[+s.dataset.cb].bucket=s.value; });
    state.categories.forEach(c=>{ if(!(c.kind==="depense"&&c.univers==="perso")) c.fixe=false; });
    host.querySelectorAll("[data-cf]").forEach(c=>{ state.categories[+c.dataset.cf].fixe=c.checked; });
    save(); alert("Catégories enregistrées."); render();
  });
}

/* ============================ IMPORT / EXPORT ============================ */
function exportBackup(){
  const blob=new Blob([JSON.stringify({type:"backup",exportedAt:new Date().toISOString(),state},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="budget-sauvegarde-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  URL.revokeObjectURL(a.href);
}
document.getElementById("fileInput").addEventListener("change", e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(obj.type==="backup" && obj.state){
        if(confirm("Remplacer les données actuelles par cette sauvegarde ?")){ state=obj.state; migrate(); save(); currentMonth=null; render(); alert("Sauvegarde importée."); }
      } else if(obj.type==="seed" && Array.isArray(obj.transactions)){
        let n=0;
        for(const t of obj.transactions){ const c=catBySlug(t.cat); state.transactions.push({id:uid(),date:t.date,amount:Number(t.amount)||0,kind:t.kind||c.kind,cat:t.cat,desc:t.desc||""}); n++; }
        const soldeMeta = (obj.meta && (typeof obj.meta.soldeInitial==="number" ? obj.meta.soldeInitial : obj.meta.soldeInitialMai));
        if(typeof soldeMeta==="number" && state.transactions.length===n) state.soldeInitial=soldeMeta;
        save(); currentMonth=null; render(); alert(n+" transaction(s) chargée(s) depuis le fichier de données.");
      } else if(Array.isArray(obj.transactions)){
        let n=0; for(const t of obj.transactions){ const c=catBySlug(t.cat); state.transactions.push({id:uid(),date:t.date,amount:Number(t.amount)||0,kind:t.kind||c.kind,cat:t.cat,desc:t.desc||""}); n++; }
        save(); currentMonth=null; render(); alert(n+" transaction(s) importée(s).");
      } else alert("Fichier non reconnu.");
    }catch(err){ alert("Erreur de lecture du fichier : "+err.message); }
    e.target.value="";
  };
  reader.readAsText(file);
});

/* ============================ INIT ============================ */
document.getElementById("tabs").addEventListener("click", e=>{ const b=e.target.closest("button"); if(b) setTab(b.dataset.tab); });
load();
render();
</script>
</body>
</html>
