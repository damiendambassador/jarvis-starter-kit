<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Archivo:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:'Archivo',system-ui,-apple-system,sans-serif;background:#F5F0E8;color:#13293F;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    ::selection{background:#F8D08A;color:#13293F}
    input,textarea,select,button{font-family:inherit}
    a{color:inherit}
    ::-webkit-scrollbar{width:11px;height:11px}
    ::-webkit-scrollbar-thumb{background:#cdbfa6;border-radius:9px;border:3px solid #F5F0E8}
    @keyframes copFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes copFadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
    @keyframes copMarquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes copSpin{to{transform:rotate(360deg)}}
    @keyframes copPulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes copWave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  </style>
</helmet>
<div>{{ app }}</div>
</x-dc>

  // ---------- shared UI ----------
  get h(){ return React.createElement; }
  wrap(kids, max){ const h=this.h; return h('div',{style:{maxWidth:(max||1200)+'px',margin:'0 auto',padding:'0 24px',width:'100%'}}, kids); }
  btn(label, onClick, variant, extra){ const h=this.h, C=this.C;
    const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'8px',cursor:'pointer',border:'none',borderRadius:'999px',fontFamily:'Archivo',fontWeight:800,fontSize:'14px',letterSpacing:'.04em',textTransform:'uppercase',padding:'13px 26px',transition:'transform .15s ease, box-shadow .2s ease, background .2s ease',textDecoration:'none'};
    const v={
      red:{background:C.red,color:'#fff',boxShadow:'0 10px 24px rgba(224,56,43,.32)'},
      navy:{background:C.navy,color:'#fff'},
      sea:{background:C.sea,color:'#fff',boxShadow:'0 10px 24px rgba(25,167,184,.3)'},
      ghost:{background:'transparent',color:C.navy,border:'2px solid '+C.navy},
      ghostLight:{background:'rgba(255,255,255,.12)',color:'#fff',border:'2px solid rgba(255,255,255,.7)'},
      gold:{background:C.gold,color:C.navyDeep}
    }[variant||'red'];
    return h('button',{onClick,style:Object.assign({},base,v,extra||{}),onMouseEnter:e=>{e.currentTarget.style.transform='translateY(-2px)';},onMouseLeave:e=>{e.currentTarget.style.transform='translateY(0)';}}, label);
  }
  eyebrow(txt, color){ const h=this.h, C=this.C; return h('div',{style:{fontFamily:'Archivo',fontWeight:800,fontSize:'13px',letterSpacing:'.28em',textTransform:'uppercase',color:color||C.red}}, txt); }
  wordmark(size, light){ const h=this.h, C=this.C; return h('span',{style:{fontFamily:'Anton',fontSize:(size||26)+'px',letterSpacing:'.02em',color:light?'#fff':C.red,lineHeight:1,display:'inline-block'}}, 'COPITÝ'); }

  renderToast(){ if(!this.state.toast) return null; const h=this.h, C=this.C;
    return h('div',{style:{position:'fixed',bottom:'26px',left:'50%',transform:'translateX(-50%)',zIndex:200,background:C.navyDeep,color:'#fff',padding:'15px 26px',borderRadius:'999px',fontWeight:700,fontSize:'14px',boxShadow:'0 16px 40px rgba(12,28,46,.4)',animation:'copFadeUp .3s ease',display:'flex',alignItems:'center',gap:'10px'}},

  renderApp(){ const h=this.h, C=this.C; const r=this.state.route;
    if(r==='menu-qr') return h('div',{}, this.renderQR(), this.renderToast());
    const isPortal = (r==='admin'||r==='staff');
    return h('div',{style:{minHeight:'100vh',background:C.cream,display:'flex',flexDirection:'column'}},
      isPortal? null : this.renderNav(),
      h('main',{id:'cop-scroll',style:{flex:1}}, this.renderScreen()),
      isPortal? null : this.renderFooter(),
      this.renderLightbox(),
      this.renderToast()
    );
  }
  renderScreen(){ const r=this.state.route;
    switch(r){
      case 'home': return this.renderHome();
      case 'menu': return this.renderMenu();
      case 'events': return this.renderEvents();
      case 'reservations': return this.renderReservations();
      case 'vip': return this.renderVip();
      case 'admin': return this.renderAdmin();
      case 'staff': return this.renderStaff();
      default: return this.renderHome();
    }
  }
